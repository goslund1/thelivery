name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never let two deploys run at once.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TARGET: x86_64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      # --- Build the Rust binary (static musl) -----------------------------
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: cargo-${{ runner.os }}-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Build backend (release, musl)
        working-directory: backend
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
        run: cargo build --release --target "$TARGET"

      # --- Build the Vue frontend -----------------------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # --- Assemble the deploy bundle -------------------------------------
      - name: Assemble bundle
        run: |
          mkdir -p bundle/seed bundle/static bundle/seed-uploads
          cp "backend/target/$TARGET/release/livery-backend" bundle/
          cp -r frontend/dist/. bundle/static/
          cp backend/seed/cards.json bundle/seed/
          cp -r backend/uploads/. bundle/seed-uploads/
          cp deploy/thelivery.service bundle/

      # --- Ship it to the droplet (over Tailscale) ------------------------
      # Join the runner to the tailnet so it can reach the droplet on its
      # private 100.x address. This lets public port 22 stay fully closed —
      # set DEPLOY_HOST to the droplet's Tailscale MagicDNS name or 100.x IP.
      # The ephemeral node is torn down when the job ends.
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          # Alternative to OAuth: use an ephemeral, pre-authorized auth key:
          #   authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          # Validate the private key parses (fails loudly if the secret is
          # truncated/mangled) and print the matching public key so it can be
          # compared against the droplet's authorized_keys.
          echo "Deploy key fingerprint:"; ssh-keygen -l -f ~/.ssh/id_deploy
          echo "Matching public key (must be in the droplet's authorized_keys):"
          ssh-keygen -y -f ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/id_deploy -o IdentitiesOnly=yes -o BatchMode=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            'echo "SSH OK as $(whoami)@$(hostname)"'

      - name: Rsync bundle to droplet
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/id_deploy -o IdentitiesOnly=yes" \
            bundle/ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/thelivery-stage/"

      - name: Run remote deploy
        run: |
          ssh -i ~/.ssh/id_deploy -o IdentitiesOnly=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            'bash -s' < deploy/remote-deploy.sh
